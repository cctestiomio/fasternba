<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports API Speed Race</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">Free/public score feed comparator</p>
      <h1>Sports API Speed Race</h1>
      <p class="sub">Major sports + esports market tags score/API probes side by side. Polls every <strong id="intervalText">3s</strong> and records which endpoint shows a score change first.</p>
    </div>
    <div class="controls">
      <label>Sport
        <select id="sportFilter">
          <option value="all">All default probes</option>
          <option value="sports">SPORTS_TAGS bundle</option>
          <option value="basketball">Basketball bundle</option>
          <option value="nba">NBA</option>
          <option value="wnba">WNBA</option>
          <option value="ncaab">NCAAB / CBB</option>
          <option value="football">Football bundle</option>
          <option value="nfl">NFL</option>
          <option value="baseball">Baseball bundle</option>
          <option value="mlb">MLB</option>
          <option value="hockey">Hockey bundle</option>
          <option value="nhl">NHL</option>
          <option value="ahl">AHL</option>
          <option value="soccer">Soccer bundle</option>
          <option value="mls">MLS</option>
          <option value="epl">EPL</option>
          <option value="uef">UEFA</option>
          <option value="fif">FIFA / international</option>
          <option value="bra2">Brazil Série B</option>
          <option value="per1">Peru Liga 1</option>
          <option value="tennis">Tennis bundle</option>
          <option value="atp">ATP Tennis</option>
          <option value="wta">WTA Tennis</option>
          <option value="golf">Golf</option>
          <option value="rugby">Rugby</option>
          <option value="volleyball">Volleyball</option>
          <option value="esports">Esports bundle</option>
          <option value="valorant">VALORANT</option>
          <option value="cs2">CS2</option>
          <option value="dota2">Dota 2</option>
          <option value="lol">League of Legends</option>
          <option value="overwatch">Overwatch</option>
          <option value="rocket league">Rocket League</option>
          <option value="cod">Call of Duty</option>
          <option value="r6">Rainbow Six</option>
          <option value="starcraft">StarCraft</option>
          <option value="hearthstone">Hearthstone</option>
          <option value="chess">Chess</option>
        </select>
      </label>
      <label>Refresh ms
        <input id="refreshMs" type="number" min="3000" step="1000" value="3000" />
      </label>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset timings</button>
    </div>
  </header>

  <main>
    <section class="statusbar">
      <div><span class="dot" id="liveDot"></span><span id="stateText">Starting…</span></div>
      <div>Last poll: <span id="lastPoll">never</span></div>
      <div>Feeds checked: <span id="feedCount">0</span></div>
    </section>
    <section id="sportSections"></section>
  </main>

  <template id="sportTemplate">
    <section class="sport-card">
      <div class="sport-head">
        <div>
          <h2></h2>
          <p class="sport-meta"></p>
        </div>
      </div>
      <div class="feed-grid"></div>
      <div class="games"></div>
    </section>
  </template>

  <script src="/app.js"></script>
</body>
</html>
